apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper-flipkart
  labels:
    app: priceradar
    component: scraper-flipkart
spec:
  replicas: 2
  selector:
    matchLabels:
      component: scraper-flipkart
  template:
    metadata:
      labels:
        app: priceradar
        component: scraper-flipkart
    spec:
      containers:
        - name: scraper-flipkart
          image: ghcr.io/OWNER/priceradar-scraper-flipkart:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: priceradar-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: scraper-flipkart-svc
  labels:
    app: priceradar
    component: scraper-flipkart
spec:
  selector:
    component: scraper-flipkart
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
