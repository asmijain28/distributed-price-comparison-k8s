apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: priceradar
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      component: frontend
  template:
    metadata:
      labels:
        app: priceradar
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/OWNER/priceradar-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: priceradar-config
                  key: GATEWAY_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  labels:
    app: priceradar
    component: frontend
spec:
  selector:
    component: frontend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
