###############################################################################
# PriceRadar v2 — Docker Compose (local development)
###############################################################################
# Usage:  docker-compose up --build
# UI:     http://localhost:3000
# API:    http://localhost:8000/search?q=iPhone
###############################################################################

x-common-env: &common-env
  SCRAPE_DELAY_MS: "500"
  SCRAPE_TIMEOUT_SECONDS: "8"

services:
  # ── Scraper: Amazon India ────────────────────────────────────────────
  scraper-amazon:
    build:
      context: ./services
      dockerfile: scraper-amazon/Dockerfile
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Scraper: Flipkart ────────────────────────────────────────────────
  scraper-flipkart:
    build:
      context: ./services
      dockerfile: scraper-flipkart/Dockerfile
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
    restart: on-failure

  # ── Scraper: Myntra ──────────────────────────────────────────────────
  scraper-myntra:
    build:
      context: ./services
      dockerfile: scraper-myntra/Dockerfile
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
    restart: on-failure

  # ── Scraper: Snapdeal ────────────────────────────────────────────────
  scraper-snapdeal:
    build:
      context: ./services
      dockerfile: scraper-snapdeal/Dockerfile
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
    restart: on-failure

  # ── API Gateway ──────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      SCRAPER_AMAZON_URL: http://scraper-amazon:8001
      SCRAPER_FLIPKART_URL: http://scraper-flipkart:8002
      SCRAPER_MYNTRA_URL: http://scraper-myntra:8003
      SCRAPER_SNAPDEAL_URL: http://scraper-snapdeal:8004
      CACHE_TTL: "300"
      GATEWAY_TIMEOUT_SECONDS: "10"
    depends_on:
      - scraper-amazon
      - scraper-flipkart
      - scraper-myntra
      - scraper-snapdeal
    restart: on-failure

  # ── Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
    ports:
      - "3000:3000"
    environment:
      GATEWAY_URL: http://api-gateway:8000
      GEMINI_API_KEY: "${GEMINI_API_KEY}"   # ← set in .env file
    depends_on:
      - api-gateway
    restart: on-failure
